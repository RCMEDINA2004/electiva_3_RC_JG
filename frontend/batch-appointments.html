<body>
    <nav>
        <div class="nav-brand">

        <div class="nav-links">

        <div class="page-header">
            <h2>⚡ Creación de Citas en Lote</h2>

        <div class="alert alert-info">
            💡 Esta vista utiliza <strong>Promise.all</strong> para crear múltiples citas simultáneamente, demostrando

        <div class="batch-form-container">
            <div id="batchEntries"></div>

            <div style="display: flex; gap: 0.75rem; margin-top: 1rem;">

                <button class="primary" id="submitBatch" onclick="submitBatch()">⚡ Crear Todas (Promise.all)</button>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - VetClinic Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <div class="nav-brand">
            <span class="logo-icon">🐾</span>
            <h1>VetClinic</h1>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="owners.html">Dueños</a>
            <a href="pets.html">Mascotas</a>
            <a href="veterinarians.html">Veterinarios</a>
            <a href="appointments.html">Citas</a>
            <a href="batch-appointments.html">Citas Lote</a>
            <a href="reports.html">Reportes</a>
        </div>
        <div class="nav-actions">
            <span class="user-badge" id="userBadge">Admin</span>
            <button class="outline sm" id="logoutBtn">Salir</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>📊 Dashboard</h2>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👤</div>
                <div class="stat-info">
                    <h3 id="ownerCount">0</h3>
                    <p>Dueños</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🐕</div>
                <div class="stat-info">
                    <h3 id="petCount">0</h3>
                    <p>Mascotas</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👨‍⚕️</div>
                <div class="stat-info">
                    <h3 id="vetCount">0</h3>
                    <p>Veterinarios</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-info">
                    <h3 id="appointmentCount">0</h3>
                    <p>Citas</p>
                </div>
            </div>
        </div>

        <h2 style="margin-bottom: 1rem;">📋 Citas Recientes</h2>
        <div id="recentAppointments"></div>
    </div>

    <script src="js/dashboard.js"></script>
</body>

</html>
